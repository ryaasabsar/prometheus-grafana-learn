global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/prometheus-rules.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "api-server-a"
    scrape_interval: 5s
    metrics_path: /metrics
    static_configs:
      - targets: ["server-a:8000"]
        labels:
          server: server-a
          service: api
          environment: dev

  - job_name: "api-server-b"
    scrape_interval: 5s
    metrics_path: /metrics
    static_configs:
      - targets: ["server-b:8000"]
        labels:
          server: server-b
          service: api
          environment: dev
